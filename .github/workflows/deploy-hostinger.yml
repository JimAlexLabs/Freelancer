# Deploy AfriGig (Vite build) to Hostinger on push to main
# Requires: GitHub repo + Hostinger SSH enabled (Web Premium+ or VPS)
# Add secrets: SSH_KEY, SSH_HOST, SSH_USER, DEPLOY_PATH (and optionally SSH_PORT)

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Run manually from Actions tab

env:
  NODE_VERSION: "20"
  # Hostinger shared hosting SSH port (VPS usually uses 22)
  DEFAULT_SSH_PORT: "65002"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || env.DEFAULT_SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dist to Hostinger
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || env.DEFAULT_SSH_PORT }} -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
